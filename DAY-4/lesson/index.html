<!doctype html>
<html lang="en">
  <head>
<meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout with Flexbox & Grid</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- PAGE TITLE -->
    <h1>Layout with Flexbox & Grid</h1>
    <p>Flexbox = One Direction | Grid = Two Dimensions</p>

    <!-- FLEXBOX SECTION -->
    <section class="flex-section">
      <h2>Flexbox Layout (1 Direction)</h2>

      <div class="flex-container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
      </div>
    </section>

    <!-- GRID SECTION -->
    <section class="grid-section">
      <h2>Grid Layout (2 Dimensions)</h2>

      <div class="grid-container">
        <div class="grid-box">A</div>
        <div class="grid-box">B</div>
        <div class="grid-box">C</div>
        <div class="grid-box">D</div>
      </div>
    </section>
  </body>
</html>
